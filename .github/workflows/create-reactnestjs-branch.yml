name: Create reactnestjs branch and reset main

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  setup-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create reactnestjs branch at 22b49d0 (pre-workflow main HEAD)
        run: |
          # Point reactnestjs to the original main HEAD before any workflow commits
          git checkout -b reactnestjs 22b49d0718ea40fdb67c4845ffc9dd28f9dabe0
          git push origin reactnestjs

      - name: Reset main to 900e1806718ea40fdb67c4845ffc9dd28f9dabe0
        run: |
          git push origin 900e1806718ea40fdb67c4845ffc9dd28f9dabe0:refs/heads/main --force

      - name: Summary
        run: |
          echo "✅ Done!"
          echo "  - reactnestjs branch → $(git rev-parse origin/reactnestjs 2>/dev/null || echo 'see above')"
          echo "  - main reset to 900e1806718ea40fdb67c4845ffc9dd28f9dabe0"
