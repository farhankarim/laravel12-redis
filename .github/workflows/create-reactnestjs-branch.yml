name: Create reactnestjs branch and reset main

on:
  push:
    branches:
      - copilot/reactnestjs

permissions:
  contents: write

jobs:
  setup-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create reactnestjs branch at 22b49d0 (if it does not already exist)
        run: |
          if git ls-remote --heads origin reactnestjs | grep -q reactnestjs; then
            echo "reactnestjs branch already exists, skipping creation."
          else
            git checkout -b reactnestjs 22b49d0718ea40fdb67c4845ffc9dd28f9dabe0
            git push origin reactnestjs
            echo "reactnestjs branch created at 22b49d0718ea40fdb67c4845ffc9dd28f9dabe0"
          fi

      - name: Reset main to 900e180 (if not already there)
        run: |
          CURRENT_MAIN=$(git rev-parse origin/main)
          TARGET="900e1806718ea40fdb67c4845ffc9dd28f9dabe0"
          if [ "$CURRENT_MAIN" = "$TARGET" ]; then
            echo "main is already at $TARGET, skipping reset."
          else
            git push origin "${TARGET}:refs/heads/main" --force
            echo "main reset to $TARGET"
          fi

      - name: Summary
        run: |
          echo "✅ Done!"
          git fetch origin
          echo "  - reactnestjs → $(git rev-parse origin/reactnestjs 2>/dev/null || echo 'not found')"
          echo "  - main → $(git rev-parse origin/main)"
