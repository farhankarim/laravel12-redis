<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redis Queue Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="min-h-screen bg-gray-50">
  <!-- Header -->
  <header class="bg-white shadow">
    <div class="max-w-7xl mx-auto py-4 px-6 flex items-center justify-between">
      <h1 class="text-2xl font-bold text-gray-900">Redis Queue Dashboard</h1>
      <nav class="flex gap-4">
        <a href="/dashboard/queue.html" class="text-indigo-600 font-semibold border-b-2 border-indigo-600 pb-1">Queue Summary</a>
        <a href="/dashboard/users.html" class="text-gray-500 hover:text-indigo-600">Users Summary</a>
        <a href="/api/docs" target="_blank" class="text-gray-500 hover:text-indigo-600">API Docs</a>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto py-8 px-6">
    <!-- Auth Banner -->
    <div id="authBanner" class="hidden mb-6 p-4 bg-yellow-50 border border-yellow-200 rounded-lg text-yellow-800 text-sm">
      ⚠️ Not authenticated. <a href="/dashboard/login.html" class="underline font-semibold">Login</a> to use the API endpoints.
      Dashboard WebSocket data is shown below (read-only).
    </div>

    <!-- Totals Grid -->
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
      <div class="bg-white rounded-lg shadow p-4 text-center">
        <p class="text-xs text-gray-500 uppercase tracking-wide">Pending</p>
        <p id="totalPending" class="text-3xl font-bold text-indigo-600 mt-1">–</p>
      </div>
      <div class="bg-white rounded-lg shadow p-4 text-center">
        <p class="text-xs text-gray-500 uppercase tracking-wide">Active</p>
        <p id="totalReserved" class="text-3xl font-bold text-yellow-500 mt-1">–</p>
      </div>
      <div class="bg-white rounded-lg shadow p-4 text-center">
        <p class="text-xs text-gray-500 uppercase tracking-wide">Delayed</p>
        <p id="totalDelayed" class="text-3xl font-bold text-blue-500 mt-1">–</p>
      </div>
      <div class="bg-white rounded-lg shadow p-4 text-center">
        <p class="text-xs text-gray-500 uppercase tracking-wide">Failed</p>
        <p id="totalFailed" class="text-3xl font-bold text-red-500 mt-1">–</p>
      </div>
      <div class="bg-white rounded-lg shadow p-4 text-center">
        <p class="text-xs text-gray-500 uppercase tracking-wide">Completed</p>
        <p id="totalCompleted" class="text-3xl font-bold text-green-500 mt-1">–</p>
      </div>
    </div>

    <!-- Controls -->
    <div class="flex items-center gap-3 mb-6">
      <button id="refreshBtn"
        class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition">
        ↻ Refresh Now
      </button>
      <span id="cachedAt" class="text-sm text-gray-400"></span>
      <span id="connStatus" class="ml-auto text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-500">Connecting…</span>
    </div>

    <!-- Per-Queue Table -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wide">
          <tr>
            <th class="px-6 py-3 text-left">Queue</th>
            <th class="px-6 py-3 text-right">Pending</th>
            <th class="px-6 py-3 text-right">Active</th>
            <th class="px-6 py-3 text-right">Delayed</th>
          </tr>
        </thead>
        <tbody id="queuesTableBody" class="divide-y divide-gray-100">
          <tr>
            <td colspan="4" class="px-6 py-8 text-center text-gray-400">Connecting to WebSocket…</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('jwt_token');
    if (!token) {
      document.getElementById('authBanner').classList.remove('hidden');
    }

    // WebSocket connection to /dashboard namespace
    const socket = io('/dashboard', {
      path: '/socket.io',
      transports: ['websocket', 'polling'],
    });

    socket.on('connect', () => {
      document.getElementById('connStatus').textContent = '● Connected';
      document.getElementById('connStatus').className =
        'ml-auto text-xs px-2 py-1 rounded-full bg-green-100 text-green-600';
      socket.emit('get-queue-summary');
    });

    socket.on('disconnect', () => {
      document.getElementById('connStatus').textContent = '○ Disconnected';
      document.getElementById('connStatus').className =
        'ml-auto text-xs px-2 py-1 rounded-full bg-red-100 text-red-500';
    });

    socket.on('queue-summary', (data) => {
      const t = data.totals || {};
      document.getElementById('totalPending').textContent = (t.pending ?? 0).toLocaleString();
      document.getElementById('totalReserved').textContent = (t.reserved ?? 0).toLocaleString();
      document.getElementById('totalDelayed').textContent = (t.delayed ?? 0).toLocaleString();
      document.getElementById('totalFailed').textContent = (t.failed ?? 0).toLocaleString();
      document.getElementById('totalCompleted').textContent = (t.completed ?? 0).toLocaleString();
      document.getElementById('cachedAt').textContent =
        data.cachedAt ? 'Last updated: ' + new Date(data.cachedAt).toLocaleTimeString() : '';

      const tbody = document.getElementById('queuesTableBody');
      if (!data.queues || data.queues.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-gray-400">No queue data</td></tr>';
        return;
      }
      tbody.innerHTML = data.queues.map(q => `
        <tr class="hover:bg-gray-50">
          <td class="px-6 py-3 font-medium text-gray-700">${q.name}</td>
          <td class="px-6 py-3 text-right text-indigo-600">${(q.pending || 0).toLocaleString()}</td>
          <td class="px-6 py-3 text-right text-yellow-500">${(q.reserved || 0).toLocaleString()}</td>
          <td class="px-6 py-3 text-right text-blue-500">${(q.delayed || 0).toLocaleString()}</td>
        </tr>
      `).join('');
    });

    // Refresh button
    document.getElementById('refreshBtn').addEventListener('click', () => {
      socket.emit('refresh-dashboard');
      setTimeout(() => socket.emit('get-queue-summary'), 500);
    });

    // Auto-refresh every 10 seconds
    setInterval(() => socket.emit('get-queue-summary'), 10000);
  </script>
</body>
</html>
