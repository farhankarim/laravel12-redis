<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Redis NestJS Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center">

  <!-- ── Registration form ── -->
  <div id="signupCard" class="bg-white rounded-xl shadow-lg p-8 w-full max-w-sm">
    <h1 class="text-2xl font-bold text-gray-900 mb-2 text-center">Create account</h1>
    <p class="text-sm text-gray-500 text-center mb-6">Redis NestJS Dashboard</p>

    <div id="errorMsg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded text-red-700 text-sm"></div>

    <form id="signupForm" class="space-y-4" novalidate>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="name">Full name</label>
        <input id="name" type="text" required autocomplete="name"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="Jane Doe" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="email">Email</label>
        <input id="email" type="email" required autocomplete="email"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="jane@example.com" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
        <input id="password" type="password" required autocomplete="new-password" minlength="8"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="At least 8 characters" />
      </div>
      <button id="submitBtn" type="submit"
        class="w-full py-2 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg text-sm transition disabled:opacity-60 disabled:cursor-not-allowed">
        Create account
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
      Already have an account?
      <a href="/dashboard/login.html" class="text-indigo-600 hover:underline font-medium">Sign in</a>
    </p>
  </div>

  <!-- ── Success screen (shown after registration) ── -->
  <div id="successCard" class="hidden bg-white rounded-xl shadow-lg p-8 w-full max-w-sm text-center">
    <div class="text-5xl mb-4">📬</div>
    <h2 class="text-xl font-bold text-gray-900 mb-2">Check your inbox</h2>
    <p class="text-sm text-gray-500 mb-1">
      We sent a verification link to
    </p>
    <p id="successEmail" class="text-sm font-semibold text-indigo-600 mb-6 break-all"></p>
    <p class="text-sm text-gray-500 mb-6">
      Click the link in that email to activate your account.
      The link expires in <strong>24 hours</strong>.
    </p>
    <a href="/dashboard/login.html"
       class="inline-block w-full py-2 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg text-sm transition text-center">
      Go to Sign In
    </a>
    <p class="text-xs text-gray-400 mt-4">
      Didn't receive it? Check your spam folder or
      <button id="resendBtn"
        class="text-indigo-500 hover:underline bg-transparent border-none cursor-pointer p-0 text-xs">
        resend the email
      </button>.
    </p>
    <p id="resendMsg" class="hidden mt-2 text-xs text-green-600"></p>
  </div>

  <script>
    const signupCard  = document.getElementById('signupCard');
    const successCard = document.getElementById('successCard');
    const submitBtn   = document.getElementById('submitBtn');
    const errorEl     = document.getElementById('errorMsg');
    let registeredEmail = '';
    let registeredName  = '';

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.add('hidden');

      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (password.length < 8) {
        errorEl.textContent = 'Password must be at least 8 characters.';
        errorEl.classList.remove('hidden');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account…';

      try {
        const resp = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await resp.json();
        if (!resp.ok) {
          const msg = Array.isArray(data.message)
            ? data.message.join(', ')
            : (data.message || 'Registration failed');
          throw new Error(msg);
        }

        // Show success screen
        registeredEmail = email;
        registeredName  = name;
        document.getElementById('successEmail').textContent = email;
        signupCard.classList.add('hidden');
        successCard.classList.remove('hidden');
      } catch (err) {
        errorEl.textContent = err.message || 'Network error – please try again.';
        errorEl.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create account';
      }
    });

    // Resend: re-submit registration; server will return 409 (already registered)
    // so instead we hit a dedicated resend endpoint if available, or show guidance.
    document.getElementById('resendBtn').addEventListener('click', async () => {
      const resendMsg = document.getElementById('resendMsg');
      resendMsg.classList.add('hidden');

      // Re-call register – it will 409, so we instead guide the user.
      // If you add a POST /auth/resend-verification endpoint later, call it here.
      resendMsg.textContent =
        'If the email still hasn\'t arrived, check your spam folder. ' +
        'The link is valid for 24 hours from when you signed up.';
      resendMsg.classList.remove('hidden');
    });
  </script>
</body>
</html>
