<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="min-h-screen bg-gray-50">
  <!-- Header -->
  <header class="bg-white shadow">
    <div class="max-w-7xl mx-auto py-4 px-6 flex items-center justify-between">
      <h1 class="text-2xl font-bold text-gray-900">Users Dashboard</h1>
      <nav class="flex gap-4">
        <a href="/dashboard/queue.html" class="text-gray-500 hover:text-indigo-600">Queue Summary</a>
        <a href="/dashboard/users.html" class="text-indigo-600 font-semibold border-b-2 border-indigo-600 pb-1">Users Summary</a>
        <a href="/api/docs" target="_blank" class="text-gray-500 hover:text-indigo-600">API Docs</a>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto py-8 px-6">
    <!-- Auth Banner -->
    <div id="authBanner" class="hidden mb-6 p-4 bg-yellow-50 border border-yellow-200 rounded-lg text-yellow-800 text-sm">
      ⚠️ Not authenticated. <a href="/dashboard/login.html" class="underline font-semibold">Login</a> for full API access.
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
      <div class="bg-white rounded-lg shadow p-6 text-center">
        <p class="text-xs text-gray-500 uppercase tracking-wide">Total Users</p>
        <p id="totalUsers" class="text-4xl font-bold text-indigo-600 mt-2">–</p>
      </div>
      <div class="bg-white rounded-lg shadow p-6 text-center">
        <p class="text-xs text-gray-500 uppercase tracking-wide">Verified</p>
        <p id="verifiedUsers" class="text-4xl font-bold text-green-500 mt-2">–</p>
      </div>
      <div class="bg-white rounded-lg shadow p-6 text-center">
        <p class="text-xs text-gray-500 uppercase tracking-wide">Unverified</p>
        <p id="unverifiedUsers" class="text-4xl font-bold text-yellow-500 mt-2">–</p>
      </div>
    </div>

    <!-- Controls -->
    <div class="flex items-center gap-3 mb-6">
      <button id="refreshBtn"
        class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition">
        ↻ Refresh Now
      </button>
      <span id="cachedAt" class="text-sm text-gray-400"></span>
      <span id="connStatus" class="ml-auto text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-500">Connecting…</span>
    </div>

    <!-- Latest User Card -->
    <div id="latestUserCard" class="hidden bg-white rounded-lg shadow p-6">
      <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-4">Latest Registered User</h2>
      <dl class="grid grid-cols-2 gap-4 text-sm">
        <div>
          <dt class="text-gray-400">ID</dt>
          <dd id="latestId" class="font-mono text-gray-700 mt-1 text-xs break-all">–</dd>
        </div>
        <div>
          <dt class="text-gray-400">Name</dt>
          <dd id="latestName" class="font-medium text-gray-900 mt-1">–</dd>
        </div>
        <div>
          <dt class="text-gray-400">Email</dt>
          <dd id="latestEmail" class="text-gray-700 mt-1">–</dd>
        </div>
        <div>
          <dt class="text-gray-400">Registered</dt>
          <dd id="latestCreatedAt" class="text-gray-700 mt-1">–</dd>
        </div>
        <div>
          <dt class="text-gray-400">Email Verified</dt>
          <dd id="latestVerified" class="mt-1">–</dd>
        </div>
      </dl>
    </div>
  </main>

  <script>
    const token = localStorage.getItem('jwt_token');
    if (!token) {
      document.getElementById('authBanner').classList.remove('hidden');
    }

    const socket = io('/dashboard', {
      path: '/socket.io',
      transports: ['websocket', 'polling'],
    });

    socket.on('connect', () => {
      document.getElementById('connStatus').textContent = '● Connected';
      document.getElementById('connStatus').className =
        'ml-auto text-xs px-2 py-1 rounded-full bg-green-100 text-green-600';
      socket.emit('get-users-summary');
    });

    socket.on('disconnect', () => {
      document.getElementById('connStatus').textContent = '○ Disconnected';
      document.getElementById('connStatus').className =
        'ml-auto text-xs px-2 py-1 rounded-full bg-red-100 text-red-500';
    });

    socket.on('users-summary', (data) => {
      document.getElementById('totalUsers').textContent = (data.total ?? 0).toLocaleString();
      document.getElementById('verifiedUsers').textContent = (data.verified ?? 0).toLocaleString();
      document.getElementById('unverifiedUsers').textContent = (data.unverified ?? 0).toLocaleString();
      document.getElementById('cachedAt').textContent =
        data.cachedAt ? 'Last updated: ' + new Date(data.cachedAt).toLocaleTimeString() : '';

      if (data.latestUser) {
        const u = data.latestUser;
        document.getElementById('latestId').textContent = u._id || '–';
        document.getElementById('latestName').textContent = u.name || '–';
        document.getElementById('latestEmail').textContent = u.email || '–';
        document.getElementById('latestCreatedAt').textContent =
          u.createdAt ? new Date(u.createdAt).toLocaleString() : '–';
        const verifiedEl = document.getElementById('latestVerified');
        if (u.emailVerifiedAt) {
          verifiedEl.innerHTML = '<span class="text-green-600 font-semibold">✓ Verified</span>';
        } else {
          verifiedEl.innerHTML = '<span class="text-yellow-500">Pending</span>';
        }
        document.getElementById('latestUserCard').classList.remove('hidden');
      }
    });

    document.getElementById('refreshBtn').addEventListener('click', () => {
      socket.emit('refresh-dashboard');
      setTimeout(() => socket.emit('get-users-summary'), 500);
    });

    setInterval(() => socket.emit('get-users-summary'), 10000);
  </script>
</body>
</html>
